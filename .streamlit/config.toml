[theme]
# Force le thème clair pour éviter le mode sombre sur mobile
base="light"

# Définit le Bleu Marine comme couleur principale (Bordures actives, boutons)
primaryColor="#0E2A47"

# Fond de page blanc pur
backgroundColor="#FFFFFF"

# Fond des bulles de chat et éléments secondaires
secondaryBackgroundColor="#F8F9FA"

# Texte en noir pour une lecture parfaite
textColor="#1E1E1E"

# Police moderne et propre
font="sans serif"

[client]
# Désactive la barre d'outils, le menu et les notifications de déploiement
toolbarMode="hidden"
showErrorDetails=false
showSidebarNavigation=false

[browser]
gatherUsageStats=false

[ui]
# Supprime la barre supérieure de décoration (ligne de couleur en haut)
hideTopBar=true
hideSidebarNav=true

[browser]
# Supprime le logo Streamlit dans l'onglet du navigateur
gatherUsageStats=false
